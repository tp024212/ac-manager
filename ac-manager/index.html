<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f1f3d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="冷氣安裝" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>冷氣安裝管理系統</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }
      input, select, textarea, button {
        font-family: inherit;
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s;
      }
      input, select, textarea {
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 8px 10px;
        background: #fff;
        color: #1e293b;
        width: 100%;
      }
      input:focus, select:focus, textarea:focus { border-color: #f59e0b; }
      button { font-family: inherit; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f8fafc;
        --color-background-tertiary: #f1f5f9;
        --color-text-primary: #1e293b;
        --color-text-secondary: #64748b;
        --color-border-tertiary: rgba(15,31,61,0.12);
        --color-border-secondary: rgba(15,31,61,0.22);
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1e293b;
          --color-background-secondary: #0f172a;
          --color-background-tertiary: #0a0f1e;
          --color-text-primary: #f1f5f9;
          --color-text-secondary: #94a3b8;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.18);
        }
        body { background: #0a0f1e; }
        input, select, textarea { background: #1e293b; color: #f1f5f9; border-color: #334155; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
